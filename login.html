<!doctype html>
<html lang="en">
<head>
<meta charset="utf8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Groomer Login — Find My Pet Groomer</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --ground: #4568b5;
    --ink: #f6efdd;
    --ink-soft: #e3dcc0;
    --card: #5779c4;
    --accent: #e0a824;
    --accent-ink: #2e1b08;
    --accent-2: #f0d199;
    --line: #8a6e45;
    --focus: #e0a824;
    --error: #f3a0a0;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --ground: #17244a;
      --ink: #f6efdd;
      --ink-soft: #cfc29c;
      --card: #22345e;
      --accent: #f0b93a;
      --accent-ink: #241404;
      --accent-2: #efc48a;
      --line: #7a6440;
      --focus: #f0b93a;
    }
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--ground);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    line-height: 1.55;
    display: flex;
    flex-direction: column;
  }

  a { color: inherit; }

  h1 {
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
    font-weight: 400;
    margin: 0;
  }

  .mono {
    font-family: ui-monospace, "SFMono-Regular", "Cascadia Mono", Consolas, monospace;
  }

  :focus-visible {
    outline: 2.5px solid var(--focus);
    outline-offset: 2px;
  }

  header.site {
    border-bottom: 1px solid var(--line);
  }
  .site-bar {
    max-width: 74rem;
    margin: 0 auto;
    padding: 1.15rem 1.75rem;
  }
  .wordmark {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    text-decoration: none;
  }
  .comb {
    display: flex;
    align-items: flex-end;
    gap: 2.5px;
    height: 18px;
  }
  .comb span {
    display: block;
    width: 2.5px;
    background: var(--accent);
    border-radius: 1px;
  }
  .comb span:nth-child(1) { height: 60%; }
  .comb span:nth-child(2) { height: 100%; }
  .comb span:nth-child(3) { height: 75%; }
  .comb span:nth-child(4) { height: 100%; }
  .comb span:nth-child(5) { height: 60%; }
  .wordmark-text {
    font-family: Georgia, serif;
    font-size: 1.15rem;
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
  }

  .auth-card {
    width: 100%;
    max-width: 26rem;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 2rem;
  }

  .eyebrow {
    font-family: ui-monospace, "SFMono-Regular", "Cascadia Mono", Consolas, monospace;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent-2);
    font-weight: 600;
  }

  .auth-card h1 {
    font-size: 1.7rem;
    margin-top: 0.5rem;
  }

  .auth-card p.sub {
    color: var(--ink-soft);
    font-size: 0.92rem;
    margin-top: 0.6rem;
    margin-bottom: 1.5rem;
  }

  .tabs {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 1.5rem;
    background: color-mix(in srgb, var(--ground) 35%, transparent);
    border-radius: 5px;
    padding: 4px;
  }
  .tabs button {
    flex: 1;
    padding: 0.55rem;
    border: none;
    background: transparent;
    border-radius: 4px;
    font: inherit;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
  }
  .tabs button.active {
    background: var(--accent);
    color: var(--accent-ink);
  }

  form { display: flex; flex-direction: column; }

  .field {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    margin-bottom: 1.1rem;
  }
  .field label {
    font-size: 0.78rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--accent-2);
    font-family: ui-monospace, "SFMono-Regular", "Cascadia Mono", Consolas, monospace;
  }
  .field input {
    font: inherit;
    font-size: 0.95rem;
    background: color-mix(in srgb, var(--ground) 40%, transparent);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 0.65rem 0.75rem;
    color: var(--ink);
  }
  .field input::placeholder { color: color-mix(in srgb, var(--ink) 50%, transparent); }
  .field .hint {
    font-size: 0.75rem;
    color: var(--ink-soft);
  }

  .submit-btn {
    background: var(--accent);
    color: var(--accent-ink);
    border: none;
    border-radius: 4px;
    padding: 0.75rem 1rem;
    font: inherit;
    font-size: 0.98rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 0.3rem;
  }
  .submit-btn:hover { filter: brightness(1.08); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .message {
    margin-top: 1rem;
    padding: 0.7rem 0.85rem;
    border-radius: 4px;
    font-size: 0.88rem;
    display: none;
  }
  .message.error {
    background: color-mix(in srgb, var(--error) 20%, transparent);
    color: var(--error);
    border: 1px solid color-mix(in srgb, var(--error) 40%, transparent);
    display: block;
  }
  .message.success {
    background: color-mix(in srgb, var(--accent-2) 20%, transparent);
    color: var(--accent-2);
    border: 1px solid color-mix(in srgb, var(--accent-2) 40%, transparent);
    display: block;
  }

  footer.site {
    border-top: 1px solid var(--line);
    padding: 1.25rem 1.75rem;
    text-align: center;
    font-size: 0.82rem;
    color: var(--ink-soft);
  }
</style>
</head>
<body>

<header class="site">
  <div class="site-bar">
    <a class="wordmark" href="index.html">
      <span class="comb" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></span>
      <span class="wordmark-text">Find My Pet Groomer</span>
    </a>
  </div>
</header>

<main>
  <div class="auth-card">
    <p class="eyebrow">Groomer portal</p>
    <h1>Manage your listing</h1>
    <p class="sub">Sign in or create an account to add or edit your grooming business.</p>

    <div class="tabs">
      <button id="tab-login" class="active" onclick="switchTab('login')" type="button">Log In</button>
      <button id="tab-signup" onclick="switchTab('signup')" type="button">Sign Up</button>
    </div>

    <form id="login-form">
      <div class="field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="submit-btn" id="login-btn">Log In</button>
    </form>

    <form id="signup-form" style="display:none;">
      <div class="field">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" required minlength="6" autocomplete="new-password" />
        <div class="hint">At least 6 characters</div>
      </div>
      <button type="submit" class="submit-btn" id="signup-btn">Create Account</button>
    </form>

    <div class="message" id="message"></div>
  </div>
</main>

<footer class="site">Find My Pet Groomer — a local grooming directory.</footer>

<script>
  const supabaseUrl = 'https://sknocllmsrkgpspfuzlp.supabase.co';
  const supabaseKey = 'sb_publishable_wXBIDKIykBGKDgCKAp_vjA_WrYUstH_';
  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  const loginForm = document.getElementById('login-form');
  const signupForm = document.getElementById('signup-form');
  const messageBox = document.getElementById('message');

  function showMessage(text, type) {
    messageBox.textContent = text;
    messageBox.className = 'message ' + type;
  }

  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('tab-login').classList.toggle('active', isLogin);
    document.getElementById('tab-signup').classList.toggle('active', !isLogin);
    loginForm.style.display = isLogin ? 'flex' : 'none';
    signupForm.style.display = isLogin ? 'none' : 'flex';
    messageBox.className = 'message';
  }

  supabase.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'profile.html';
  });

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;

    const { error } = await supabase.auth.signInWithPassword({ email, password });
    btn.disabled = false;

    if (error) {
      showMessage(error.message, 'error');
    } else {
      showMessage('Logged in! Redirecting...', 'success');
      window.location.href = 'profile.html';
    }
  });

  signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('signup-btn');
    btn.disabled = true;
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-password').value;

    const { error } = await supabase.auth.signUp({ email, password });
    btn.disabled = false;

    if (error) {
      showMessage(error.message, 'error');
    } else {
      showMessage('Account created! Check your email to confirm, then log in.', 'success');
    }
  });
</script>

</body>
</html>
